name: Patch View State

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/patch-view-state.js
      - .github/workflows/patch-view-state.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch app.js
        run: node scripts/patch-view-state.js
      - name: Remove temporary patch files
        run: |
          rm -f scripts/patch-view-state.js
          rm -f .github/workflows/patch-view-state.yml
          rmdir scripts 2>/dev/null || true
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Fix card save view rerendering"
          git push
