name: Tune iOS typography
on:
  push:
    paths:
      - .github/workflows/tune-ios-type.yml
jobs:
  tune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Tune CSS scale
        run: |
          cat <<'CSS' >> style.css

/* Compact top and bottom bar tuning */
.hdr{padding:12px 20px 6px;}
.hdr-logo{font-size:28px;letter-spacing:-.8px;}
.hdr-actions{gap:2px;}
.icon-btn{width:34px;height:34px;border-radius:10px;}
.icon-btn svg{width:18px;height:18px;stroke-width:1.7;}
.bnav{padding:5px 0 max(8px,env(safe-area-inset-bottom));}
.nbtn{font-size:10px;gap:2px;padding:4px 4px;}
.nbtn svg{width:20px;height:20px;stroke-width:1.55;}
.board-back-hdr{padding:2px 0 6px;}
.board-nav-left span,.boards-back span{font-size:15px;}
.board-nav-left svg,.boards-back svg{width:17px;height:17px;}
@media (max-width:390px){
  .hdr-logo{font-size:27px;}
  .icon-btn{width:32px;height:32px;}
  .icon-btn svg{width:17px;height:17px;}
  .nbtn svg{width:19px;height:19px;}
}
CSS
          rm .github/workflows/tune-ios-type.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/tune-ios-type.yml
          git commit -m "Tune compact top and bottom bars"
          git push
