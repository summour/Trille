name: Tune iOS typography
on:
  push:
    paths:
      - .github/workflows/tune-ios-type.yml
jobs:
  tune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Reduce top and bottom scale
        run: |
          cat <<'CSS' >> style.css

/* 30% smaller top and bottom bars */
.hdr{padding:8px 16px 4px;}
.hdr-logo{font-size:20px;letter-spacing:-.45px;}
.hdr-actions{gap:1px;}
.icon-btn{width:24px;height:24px;border-radius:8px;}
.icon-btn svg{width:13px;height:13px;stroke-width:1.65;}
.bnav{padding:3px 0 max(5px,env(safe-area-inset-bottom));}
.nbtn{font-size:7px;gap:1px;padding:3px 3px;}
.nbtn svg{width:14px;height:14px;stroke-width:1.5;}
.board-back-hdr{padding:1px 0 4px;}
.board-nav-left span,.boards-back span{font-size:11px;}
.board-nav-left svg,.boards-back svg{width:12px;height:12px;}
@media (max-width:390px){
  .hdr-logo{font-size:19px;}
  .icon-btn{width:23px;height:23px;}
  .icon-btn svg{width:12px;height:12px;}
  .nbtn svg{width:13px;height:13px;}
}
CSS
          rm .github/workflows/tune-ios-type.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add style.css .github/workflows/tune-ios-type.yml
          git commit -m "Reduce top and bottom bars by thirty percent"
          git push
