name: Refactor Trille

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/refactor-trille.js
      - .github/workflows/refactor-trille.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Split files and patch view state
        run: node scripts/refactor-trille.js
      - name: Remove temporary refactor files
        run: |
          rm -f scripts/refactor-trille.js
          rm -f .github/workflows/refactor-trille.yml
          rmdir scripts 2>/dev/null || true
      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Split app files and fix card save view state"
          git push
