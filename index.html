<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trille</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f8f7f5;--ink:#111;--ink2:#666;--ink3:#bbb;--line:#e2dfd9;--surface:#fff;--hover:#f2efe9;--r:13px;}
[data-dark]{--bg:#111;--ink:#f0ede7;--ink2:#888;--ink3:#444;--line:#252320;--surface:#1b1a18;--hover:#222;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh;font-size:13px;}
button,input,textarea,select{font:inherit;color:inherit;background:none;border:none;}
button{cursor:pointer;}
a{color:inherit;}

header{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--line);height:50px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Instrument Serif',serif;font-size:19px;letter-spacing:-.4px;}
.logo em{font-style:italic;color:var(--ink3);}
.hr{display:flex;gap:4px;}
.hbtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink2);transition:background .12s;border:1px solid transparent;}
.hbtn:hover{background:var(--hover);border-color:var(--line);color:var(--ink);}

#toolbar{padding:9px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;}
.tbr{margin-left:auto;}
.btn{height:30px;padding:0 11px;border-radius:7px;border:1px solid var(--line);background:var(--surface);font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:all .12s;color:var(--ink2);}
.btn:hover{background:var(--hover);color:var(--ink);}
.btn.pri{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.btn.pri:hover{opacity:.82;}
.btn.act{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.cnt{font-size:11px;color:var(--ink3);}

#srch-wrap{padding:9px 16px;border-bottom:1px solid var(--line);display:none;}
.srch-in{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);outline:none;}
.srch-in:focus{border-color:var(--ink3);}

main{padding:14px 16px 84px;max-width:680px;margin:0 auto;}
.cards{display:flex;flex-direction:column;gap:9px;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.card:hover{border-color:var(--ink3);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.card.dragging{opacity:.35;}
.card.drag-over{border-color:var(--ink);outline:1.5px solid var(--ink);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px;}
.card-left{flex:1;min-width:0;}
.type-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
.card-title{font-family:'Instrument Serif',serif;font-size:17px;line-height:1.28;letter-spacing:-.15px;}
.card-desc{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4;}
.mbtn{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:15px;flex-shrink:0;letter-spacing:1px;transition:background .12s;}
.mbtn:hover{background:var(--hover);color:var(--ink);}

.cl{display:flex;flex-direction:column;gap:4px;margin-top:3px;}
.ci{display:flex;align-items:center;gap:8px;font-size:13px;padding:2px 0;cursor:pointer;}
.ci input[type=checkbox]{width:14px;height:14px;accent-color:var(--ink);flex-shrink:0;cursor:pointer;}
.ci.done span{text-decoration:line-through;color:var(--ink3);}
.cl-prog{font-size:11px;color:var(--ink3);margin-top:6px;}

.flds{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.frow{display:flex;align-items:baseline;gap:8px;font-size:12px;line-height:1.5;}
.fk{color:var(--ink3);min-width:60px;max-width:96px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fv{color:var(--ink);word-break:break-word;flex:1;}
.fv a{text-decoration:underline;text-underline-offset:2px;}
.fv.warn{color:#b45309;}
.tag-chip{display:inline-block;padding:1px 7px;border:1px solid var(--line);border-radius:100px;font-size:11px;margin:1px 2px 1px 0;}
.pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;border:1px solid var(--line);color:var(--ink2);}
.stars{letter-spacing:2px;}
.prog-bar{height:4px;background:var(--line);border-radius:2px;display:inline-block;width:80px;vertical-align:middle;margin-right:6px;}
.prog-fill{height:100%;border-radius:2px;background:var(--ink);}

.card-note{margin-top:9px;padding:9px 11px;background:var(--hover);border-radius:8px;font-size:12px;color:var(--ink2);line-height:1.6;border:1px solid var(--line);}

.empty{text-align:center;padding:60px 20px;color:var(--ink3);}
.empty h3{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink2);margin-bottom:6px;}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg);border-top:1px solid var(--line);display:flex;padding:5px 0 max(5px,env(safe-area-inset-bottom));}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:11px;color:var(--ink3);letter-spacing:.04em;transition:color .12s;}
.nbtn.active{color:var(--ink);}

.ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;transform:translateY(28px);transition:transform .22s ease;padding-bottom:max(18px,env(safe-area-inset-bottom));}
.ov.open .modal{transform:translateY(0);}
.mhandle{width:34px;height:3px;border-radius:2px;background:var(--line);margin:11px auto 0;}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);}
.mhead h2{font-family:'Instrument Serif',serif;font-size:18px;}
.mbody{padding:16px;display:flex;flex-direction:column;gap:14px;}

.fg{display:flex;flex-direction:column;gap:6px;}
.fl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;}
.fi{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--hover);outline:none;font-size:13px;resize:vertical;}
.fi:focus{border-color:var(--ink2);background:var(--surface);}

.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.tbtn{padding:8px 5px;border-radius:8px;border:1px solid var(--line);background:var(--hover);font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);transition:all .12s;text-align:center;}
.tbtn.sel{background:var(--ink);color:var(--bg);border-color:var(--ink);}

.cled{display:flex;flex-direction:column;gap:5px;}
.clrow{display:flex;align-items:center;gap:5px;}
.clrow input{flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--hover);outline:none;}
.clrow input:focus{border-color:var(--ink2);background:var(--surface);}
.delbtn{width:26px;height:26px;border-radius:6px;color:var(--ink3);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.delbtn:hover{background:#fee2e2;color:#ef4444;}
.addbtn{font-size:12px;color:var(--ink3);padding:3px 0;text-align:left;}
.addbtn:hover{color:var(--ink);}

/* ── Notion-style field editor ── */
.nf-editor{display:flex;flex-direction:column;gap:5px;}
.nf-row{display:flex;align-items:stretch;gap:5px;position:relative;}
.nf-type-btn{width:32px;flex-shrink:0;border:1px solid var(--line);border-radius:8px;background:var(--hover);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--ink2);transition:all .12s;font-family:'DM Mono',monospace;}
.nf-type-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.nf-key{width:88px;flex-shrink:0;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:var(--hover);outline:none;font-size:12px;}
.nf-key:focus{border-color:var(--ink2);background:var(--surface);}
.nf-val-wrap{flex:1;min-width:0;}

.nf-in{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--hover);outline:none;font-size:12px;}
.nf-in:focus{border-color:var(--ink2);background:var(--surface);}
select.nf-in{cursor:pointer;color:var(--ink);}

.nf-check-wrap{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--hover);height:34px;}
.nf-check-wrap input{width:15px;height:15px;accent-color:var(--ink);cursor:pointer;}
.nf-check-label{font-size:12px;color:var(--ink2);}

.nf-multi{display:flex;flex-wrap:wrap;gap:3px;align-items:center;padding:4px 8px;border-radius:8px;border:1px solid var(--line);background:var(--hover);min-height:34px;cursor:text;}
.nf-multi.focused{border-color:var(--ink2);background:var(--surface);}
.nf-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border:1px solid var(--line);border-radius:100px;font-size:11px;background:var(--surface);}
.nf-tag-del{font-size:13px;color:var(--ink3);line-height:1;}
.nf-tag-del:hover{color:#ef4444;}
.nf-multi-in{border:none;outline:none;background:transparent;font-size:12px;min-width:70px;flex:1;padding:3px 0;}

.nf-rating{display:flex;gap:3px;align-items:center;padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:var(--hover);height:34px;}
.nf-star{font-size:17px;cursor:pointer;color:var(--line);line-height:1;transition:color .1s;user-select:none;}
.nf-star.on{color:var(--ink);}

.nf-prog-wrap{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--hover);height:34px;}
.nf-prog-wrap input[type=range]{flex:1;accent-color:var(--ink);}
.nf-prog-n{font-size:11px;color:var(--ink3);min-width:30px;text-align:right;}

.nf-file-wrap{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--hover);height:34px;}
.nf-file-name{flex:1;font-size:12px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nf-file-lbl{font-size:11px;color:var(--ink3);text-decoration:underline;cursor:pointer;flex-shrink:0;}
.nf-file-lbl:hover{color:var(--ink);}

/* Type picker popup */
.ft-popup{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:5px;min-width:200px;box-shadow:0 8px 30px rgba(0,0,0,.14);display:none;max-height:300px;overflow-y:auto;}
.ft-popup.open{display:block;}
.ftp-sec{padding:6px 10px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);}
.ftp-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--ink2);}
.ftp-item:hover{background:var(--hover);color:var(--ink);}
.ftp-icon{width:22px;text-align:center;font-size:13px;color:var(--ink3);}

.act-row{display:flex;gap:7px;margin-top:4px;}
.act-btn{flex:1;padding:10px;border-radius:9px;border:1px solid var(--line);font-size:12px;font-weight:500;transition:all .12s;color:var(--ink2);}
.act-btn:hover{background:var(--hover);color:var(--ink);}
.act-btn.danger{color:#ef4444;border-color:#fecaca;}
.act-btn.danger:hover{background:#fee2e2;}

.ctx{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:0 8px 28px rgba(0,0,0,.13);padding:5px;min-width:145px;opacity:0;pointer-events:none;transform:scale(.95);transform-origin:top right;transition:all .1s ease;}
.ctx.open{opacity:1;pointer-events:all;transform:scale(1);}
.ctx-i{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:7px;font-size:12px;color:var(--ink2);}
.ctx-i:hover{background:var(--hover);color:var(--ink);}
.ctx-i.danger{color:#ef4444;}
.ctx-div{height:1px;background:var(--line);margin:4px 0;}

/* Stats */
.sv{padding:14px 16px 84px;max-width:680px;margin:0 auto;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.sc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;}
.sn{font-family:'Instrument Serif',serif;font-size:34px;line-height:1;}
.sl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}
.bar-row{margin-bottom:11px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:4px;}
.btrack{height:3px;background:var(--line);border-radius:2px;}
.bfill{height:100%;border-radius:2px;background:var(--ink);}

/* Calendar */
.cv{padding:14px 16px 84px;max-width:680px;margin:0 auto;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-title{font-family:'Instrument Serif',serif;font-size:21px;}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdh{text-align:center;font-size:10px;color:var(--ink3);padding:5px 0;text-transform:uppercase;letter-spacing:.06em;}
.cd{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;}
.cd:hover{background:var(--hover);}
.cd.today{background:var(--ink);color:var(--bg);}
.cd.hev::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--ink2);}
.cd.today.hev::after{background:var(--bg);}

/* Settings */
.stv{padding:14px 16px 84px;max-width:680px;margin:0 auto;}
.ss-t{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:7px;font-weight:500;}
.si{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;background:var(--surface);border:1px solid var(--line);border-radius:10px;margin-bottom:5px;cursor:pointer;transition:background .12s;gap:10px;}
.si:hover{background:var(--hover);}
.si span{font-size:13px;}
.si .r{font-size:12px;color:var(--ink3);}
.bn-in{background:none;border:none;outline:none;font-size:13px;color:var(--ink2);text-align:right;min-width:80px;max-width:180px;}
.tog{width:38px;height:22px;border-radius:11px;background:var(--line);position:relative;transition:background .18s;flex-shrink:0;}
.tog.on{background:var(--ink);}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.18);}
.tog.on::after{transform:translateX(16px);}

.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg);padding:8px 15px;border-radius:100px;font-size:12px;z-index:500;opacity:0;transition:all .22s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}
</style>
</head>
<body>

<header>
  <span class="logo">trill<em>e</em></span>
  <div class="hr">
    <button class="hbtn" onclick="toggleSearch()">&#9906;</button>
    <button class="hbtn" onclick="toggleTheme()" id="theme-btn">&#9670;</button>
  </div>
</header>

<div id="toolbar">
  <button class="btn pri" onclick="openAdd()">+ Add</button>
  <button class="btn" onclick="toggleReorder()" id="reorder-btn">Reorder</button>
  <div class="tbr"><span class="cnt" id="card-count"></span></div>
</div>

<div id="srch-wrap"><input class="srch-in" id="srch-in" placeholder="Search..." oninput="onSearch(this.value)"></div>

<main class="hidden" id="view-board">
  <div class="cards" id="board"></div>
  <div style="margin-top:9px"><button class="btn" style="width:100%;justify-content:center" onclick="openAdd()">+ Add another</button></div>
</main>
<div class="sv hidden" id="view-stats"></div>
<div class="cv hidden" id="view-calendar"></div>
<div class="stv hidden" id="view-settings">
  <div style="margin-bottom:20px">
    <div class="ss-t">Board</div>
    <div class="si"><span>Name</span><input class="bn-in" id="bn-in" value="My Workflow" oninput="updateBN(this.value)"></div>
    <div class="si"><span>Dark mode</span><button class="tog" id="dark-tog" onclick="toggleTheme()"></button></div>
  </div>
  <div>
    <div class="ss-t">Data</div>
    <div class="si" onclick="exportData()"><span>Export JSON</span><span class="r">&#8599;</span></div>
    <div class="si" onclick="importData()"><span>Import JSON</span><span class="r">&#8601;</span></div>
    <div class="si" onclick="clearAll()" style="color:#ef4444"><span>Clear all</span><span class="r">&#215;</span></div>
  </div>
</div>

<nav class="bnav">
  <button class="nbtn active" id="nav-board" onclick="switchView('board',this)">Board</button>
  <button class="nbtn" id="nav-stats" onclick="switchView('stats',this)">Stats</button>
  <button class="nbtn" id="nav-calendar" onclick="switchView('calendar',this)">Calendar</button>
  <button class="nbtn" id="nav-settings" onclick="switchView('settings',this)">Settings</button>
</nav>

<!-- ADD/EDIT MODAL -->
<div class="ov" id="modal-add" onclick="ovClose(event,'modal-add')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead"><h2 id="modal-add-title">New Card</h2><button class="hbtn" onclick="closeModal('modal-add')">&#215;</button></div>
    <div class="mbody">
      <div class="fg"><label class="fl">Type</label><div class="tgrid" id="type-grid"></div></div>
      <div class="fg"><label class="fl">Title</label><input class="fi" id="f-title" placeholder="Card title" maxlength="80"></div>
      <div class="fg"><label class="fl">Description</label><textarea class="fi" id="f-desc" rows="2" placeholder="Optional"></textarea></div>
      <div id="dyn-fields"></div>
      <button class="btn pri" style="width:100%;height:40px;border-radius:9px;font-size:13px" onclick="saveCard()" id="save-lbl">Create Card</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="ov" id="modal-detail" onclick="ovClose(event,'modal-detail')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead" style="border:none;padding-bottom:6px">
      <div>
        <div id="d-tag" style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px"></div>
        <h2 id="d-title" style="font-family:'Instrument Serif',serif;font-size:22px;line-height:1.2;letter-spacing:-.25px"></h2>
        <p id="d-desc" style="font-size:13px;color:var(--ink2);margin-top:2px"></p>
      </div>
      <div style="display:flex;gap:4px">
        <button class="hbtn" onclick="editFromDetail()">&#9998;</button>
        <button class="hbtn" onclick="closeModal('modal-detail')">&#215;</button>
      </div>
    </div>
    <div class="mbody" id="d-body"></div>
  </div>
</div>

<!-- CTX -->
<div class="ctx" id="ctx">
  <button class="ctx-i" onclick="ctxEdit()">Edit</button>
  <button class="ctx-i" onclick="ctxDup()">Duplicate</button>
  <div class="ctx-div"></div>
  <button class="ctx-i danger" onclick="ctxDel()">Delete</button>
</div>

<!-- Field type picker -->
<div class="ft-popup" id="ft-popup"></div>

<div class="toast" id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ── State ──
let cards=[],editId=null,ctxId=null,selType='habit';
let clItems=[],nfFields=[];
let reorder=false,dragIdx=null,dark=false,bn='My Workflow',sq='',showSrch=false,curView='board';
let calY,calM,activePicker=null;

// ── Field types (Notion-style) ──
const FT={
  text:    {label:'Text',     sym:'T'},
  number:  {label:'Number',   sym:'#'},
  date:    {label:'Date',     sym:'D'},
  select:  {label:'Select',   sym:'S'},
  multi:   {label:'Multi',    sym:'M'},
  check:   {label:'Checkbox', sym:'&#9744;'},
  url:     {label:'URL',      sym:'&#8599;'},
  email:   {label:'Email',    sym:'@'},
  phone:   {label:'Phone',    sym:'&#9742;'},
  person:  {label:'Person',   sym:'&#9786;'},
  rating:  {label:'Rating',   sym:'&#9733;'},
  progress:{label:'Progress', sym:'%'},
  formula: {label:'Formula',  sym:'f'},
  file:    {label:'File',     sym:'&#128206;'},
  longtext:{label:'Long text',sym:'&#182;'},
};
const FT_GROUPS=[
  {sec:'Basic',   keys:['text','number','date','check']},
  {sec:'Select',  keys:['select','multi']},
  {sec:'Contact', keys:['url','email','phone','person']},
  {sec:'Visual',  keys:['rating','progress']},
  {sec:'Other',   keys:['formula','file','longtext']},
];

const TYPES={habit:{label:'Habit'},focus:{label:'Focus'},output:{label:'Output'},project:{label:'Project'},waiting:{label:'Waiting'},note:{label:'Note'},custom:{label:'Custom'}};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function defVal(t){const m={check:false,multi:[],rating:0,progress:0,number:0};return m[t]!==undefined?m[t]:'';}

// ── Init ──
function init(){
  const tc=localStorage.getItem('t-cards'),tb=localStorage.getItem('t-board'),th=localStorage.getItem('t-theme');

  if(tb)bn=tb;
  if(!cards.length)loadDefaults();
  if(th==='dark')setDark(true);
  document.getElementById('bn-in').value=bn;
  renderTypeGrid();
  switchView('board');
}
function save(){localStorage.setItem('t-cards',JSON.stringify(cards));localStorage.setItem('t-board',bn);}

// ── Theme ──
function setDark(v){dark=v;v?document.documentElement.setAttribute('data-dark',''):document.documentElement.removeAttribute('data-dark');document.getElementById('theme-btn').innerHTML=v?'&#9675;':'&#9670;';document.getElementById('dark-tog')?.classList.toggle('on',v);localStorage.setItem('t-theme',v?'dark':'light');}
function toggleTheme(){setDark(!dark);}

// ── Views ──
function switchView(v,btn){curView=v;['board','stats','calendar','settings'].forEach(n=>document.getElementById('view-'+n)?.classList.toggle('hidden',n!==v));document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));(btn||document.getElementById('nav-'+v))?.classList.add('active');document.getElementById('toolbar').style.display=v==='board'?'flex':'none';document.getElementById('srch-wrap').style.display=v==='board'&&showSrch?'block':'none';if(v==='stats')renderStats();if(v==='calendar')renderCal();if(v==='board')renderBoard();}

// ── Search ──
function toggleSearch(){showSrch=!showSrch;document.getElementById('srch-wrap').style.display=showSrch?'block':'none';if(!showSrch){sq='';renderBoard();}else setTimeout(()=>document.getElementById('srch-in').focus(),50);}
function onSearch(v){sq=v;renderBoard();}

// ── Board ──
function renderBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  const list=sq?cards.filter(c=>(c.title+' '+(c.desc||'')).toLowerCase().includes(sq.toLowerCase())):cards;
  if(!list.length){b.innerHTML='<div class="empty"><h3>Nothing here.</h3><p>Tap + Add to start.</p></div>';return;}
  list.forEach((card,idx)=>b.appendChild(buildCard(card,idx)));
  document.getElementById('card-count').textContent=cards.length+' card'+(cards.length!==1?'s':'');
}

function buildCard(card,idx){
  const el=document.createElement('div');el.className='card';el.dataset.id=card.id;
  el.innerHTML=cardHTML(card);
  el.addEventListener('click',e=>{if(e.target.closest('.mbtn')||e.target.closest('.ci'))return;openDetail(card.id);});
  el.querySelector('.mbtn')?.addEventListener('click',e=>{e.stopPropagation();showCtx(e,card.id);});
  el.querySelectorAll('.ci input').forEach(cb=>cb.addEventListener('change',e=>{e.stopPropagation();toggleCheck(card.id,cb.dataset.iid,cb.checked);}));
  if(reorder){el.draggable=true;el.addEventListener('dragstart',()=>{dragIdx=idx;el.classList.add('dragging');});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');dropCard(idx);});}
  return el;
}

function cardHTML(card){
  const typeLabel=(TYPES[card.type]||TYPES.custom).label;
  const menu='<button class="mbtn">&#8943;</button>';
  const hdr='<div class="card-top"><div class="card-left"><div class="type-tag">'+typeLabel+'</div><div class="card-title">'+esc(card.title)+'</div>'+(card.desc?'<div class="card-desc">'+esc(card.desc)+'</div>':'')+'</div>'+menu+'</div>';
  let body='';
  if(card.type==='habit'&&(card.items||[]).length){
    const done=(card.items||[]).filter(i=>i.done).length,tot=(card.items||[]).length;
    body+='<div class="cl">'+(card.items||[]).map(it=>'<label class="ci'+(it.done?' done':'')+'"><input type="checkbox" data-iid="'+it.id+'" '+(it.done?'checked':'')+'><span>'+esc(it.text)+'</span></label>').join('')+'</div><div class="cl-prog">'+done+' / '+tot+'</div>';
  }
  const nf=card.nf||[];
  if(nf.length)body+='<div class="flds">'+nf.map(f=>fDisplayHTML(f)).join('')+'</div>';
  if(card.note)body+='<div class="card-note">'+esc(card.note).replace(/\n/g,'<br>')+'</div>';
  return hdr+body;
}

function fDisplayHTML(f){
  let v='';const val=f.value;
  switch(f.type){
    case 'text':case 'formula':case 'person': v=esc(val||'—');break;
    case 'number': v=val!==''&&val!==undefined?String(val):'—';break;
    case 'date': if(val){const d=new Date(val);const left=Math.ceil((d-new Date())/86400000);v=d.toLocaleDateString('en-GB')+(left>=0&&left<=30?' <span class="fv warn">('+left+'d)</span>':'');}else v='—';break;
    case 'select': v=val?'<span class="pill">'+esc(val)+'</span>':'—';break;
    case 'multi': v=(Array.isArray(val)?val:[]).map(t=>'<span class="tag-chip">'+esc(t)+'</span>').join('')||'—';break;
    case 'check': v=val?'&#9745; Yes':'&#9744; No';break;
    case 'url': v=val?'<a href="'+esc(val)+'" target="_blank" rel="noopener">'+esc(val.replace(/^https?:\/\//,'').slice(0,40))+'</a>':'—';break;
    case 'email': v=val?'<a href="mailto:'+esc(val)+'">'+esc(val)+'</a>':'—';break;
    case 'phone': v=val?'<a href="tel:'+esc(val)+'">'+esc(val)+'</a>':'—';break;
    case 'rating': {const n=parseInt(val)||0;v='<span class="stars">'+'&#9733;'.repeat(n)+'<span style="color:var(--line)">'+'&#9733;'.repeat(5-n)+'</span></span>';break;}
    case 'progress': {const p=parseInt(val)||0;v='<span class="prog-bar"><span class="prog-fill" style="width:'+p+'%;display:block"></span></span>'+p+'%';break;}
    case 'file': v=val?'<span style="text-decoration:underline;text-underline-offset:2px">'+esc(val)+'</span>':'—';break;
    case 'longtext': v='<span style="white-space:pre-wrap">'+esc(val||'')+'</span>';break;
    default: v=esc(val||'—');
  }
  return '<div class="frow"><span class="fk">'+esc(f.key||'—')+'</span><span class="fv">'+v+'</span></div>';
}

function toggleCheck(cid,iid,v){const c=cards.find(x=>x.id===cid);const it=c?.items?.find(x=>x.id===iid);if(it){it.done=v;save();renderBoard();renderStats();}}

// ── Type grid ──
function renderTypeGrid(){document.getElementById('type-grid').innerHTML=Object.keys(TYPES).map(t=>'<button class="tbtn" data-t="'+t+'" onclick="selectType(\''+t+'\')">'+TYPES[t].label+'</button>').join('');}
function selectType(t,card){selType=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('sel',b.dataset.t===t));renderDyn(card);}

// ── Dynamic fields ──
function renderDyn(card){
  let h='';
  if(selType==='habit'){
    h+='<div class="fg"><label class="fl">Activities</label><div class="cled" id="cl-editor">'+clItems.map((it,i)=>'<div class="clrow"><input type="text" placeholder="Activity..." value="'+esc(it.text)+'" oninput="clItems['+i+'].text=this.value" onkeydown="clKey(event,'+i+')"><button class="delbtn" onclick="clDel('+i+')">&#215;</button></div>').join('')+'</div><button class="addbtn" onclick="clAdd()">+ Add activity</button></div>';
  }
  h+='<div class="fg"><label class="fl">Note</label><textarea class="fi" id="f-note" rows="2" placeholder="Notes...">'+(card?.note||'')+'</textarea></div>';
  h+='<div class="fg"><label class="fl">Fields</label><div class="nf-editor" id="nf-editor">'+nfFields.map((f,i)=>nfRowHTML(f,i)).join('')+'</div><button class="addbtn" onclick="nfAdd()">+ Add field</button></div>';
  document.getElementById('dyn-fields').innerHTML=h;
}

// ── NF row HTML ──
function nfRowHTML(f,i){
  const sym=FT[f.type]?FT[f.type].sym:'T';
  return '<div class="nf-row" id="nfrow-'+f.id+'"><button class="nf-type-btn" onclick="openPicker(\''+f.id+'\','+i+')" title="'+(FT[f.type]?.label||'Text')+'">'+sym+'</button><input class="nf-key" type="text" placeholder="Name" value="'+esc(f.key)+'" oninput="nfFields['+i+'].key=this.value"><div class="nf-val-wrap">'+nfValHTML(f,i)+'</div><button class="delbtn" onclick="nfDel('+i+')">&#215;</button></div>';
}

function nfValHTML(f,i){
  const v=f.value;const id=f.id;
  switch(f.type){
    case 'text': return '<input class="nf-in" type="text" placeholder="Value..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
    case 'number': return '<input class="nf-in" type="number" placeholder="0" value="'+(v!==undefined?v:'')+'" oninput="nfFields['+i+'].value=parseFloat(this.value)||0">';
    case 'date': return '<input class="nf-in" type="date" value="'+(v||'')+'" style="color:var(--ink)" oninput="nfFields['+i+'].value=this.value">';
    case 'select': {
      const opts=['To Do','In Progress','Done','Blocked','On Hold','Not Started','Cancelled'];
      return '<select class="nf-in" onchange="nfFields['+i+'].value=this.value"><option value="">— select —</option>'+opts.map(o=>'<option value="'+o+'"'+(v===o?' selected':'')+'>'+o+'</option>').join('')+(v&&!opts.includes(v)?'<option value="'+esc(v)+'" selected>'+esc(v)+'</option>':'')+'</select>';
    }
    case 'multi': return nfMultiHTML(f,i);
    case 'check': return '<div class="nf-check-wrap"><input type="checkbox" '+(v?'checked':'')+' onchange="nfFields['+i+'].value=this.checked;this.nextElementSibling.textContent=this.checked?\'Yes\':\'No\'"><span class="nf-check-label">'+(v?'Yes':'No')+'</span></div>';
    case 'url': return '<input class="nf-in" type="url" placeholder="https://..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
    case 'email': return '<input class="nf-in" type="email" placeholder="email@..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
    case 'phone': return '<input class="nf-in" type="tel" placeholder="+66..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
    case 'person': return '<input class="nf-in" type="text" placeholder="Name..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
    case 'rating': return nfRatingHTML(f,i);
    case 'progress': return '<div class="nf-prog-wrap"><input type="range" min="0" max="100" value="'+(parseInt(v)||0)+'" oninput="nfFields['+i+'].value=parseInt(this.value);this.nextElementSibling.textContent=this.value+\'%\'"><span class="nf-prog-n">'+(parseInt(v)||0)+'%</span></div>';
    case 'formula': return '<input class="nf-in" type="text" placeholder="e.g. prop(\'A\') * 2" value="'+esc(v||'')+'" style="font-style:italic;color:var(--ink3)" oninput="nfFields['+i+'].value=this.value">';
    case 'file': return '<div class="nf-file-wrap"><span class="nf-file-name">'+(v?esc(v):'No file')+'</span><label class="nf-file-lbl">Upload<input type="file" style="display:none" onchange="nfFields['+i+'].value=this.files[0]?.name||\'\'"></label></div>';
    case 'longtext': return '<textarea class="nf-in" rows="3" placeholder="Long text..." oninput="nfFields['+i+'].value=this.value" style="resize:vertical">'+esc(v||'')+'</textarea>';
    default: return '<input class="nf-in" type="text" placeholder="Value..." value="'+esc(v||'')+'" oninput="nfFields['+i+'].value=this.value">';
  }
}

function nfMultiHTML(f,i){
  const tags=Array.isArray(f.value)?f.value:[];
  return '<div class="nf-multi" id="nfm-'+f.id+'">'+tags.map((t,ti)=>'<span class="nf-tag">'+esc(t)+'<button class="nf-tag-del" onclick="tagDel(\''+f.id+'\','+i+','+ti+')">&#215;</button></span>').join('')+'<input class="nf-multi-in" id="nfmin-'+f.id+'" placeholder="'+(tags.length?'':'Add, press Enter')+'" onkeydown="tagKey(event,\''+f.id+'\','+i+')"></div>';
}

function nfRatingHTML(f,i){
  const n=parseInt(f.value)||0;
  return '<div class="nf-rating">'+[1,2,3,4,5].map(s=>'<span class="nf-star'+(s<=n?' on':'')+'" data-s="'+s+'" onclick="setRating('+i+','+s+',\''+f.id+'\')">&#9733;</span>').join('')+'</div>';
}

function setRating(idx,val,fid){
  nfFields[idx].value=val;
  document.querySelectorAll('#nfrow-'+fid+' .nf-star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.s)<=val));
}

function tagKey(e,fid,idx){
  if(e.key==='Enter'||e.key===','||e.key==='Tab'){
    e.preventDefault();const v=e.target.value.trim();
    if(v){if(!Array.isArray(nfFields[idx].value))nfFields[idx].value=[];nfFields[idx].value.push(v);e.target.value='';
    const wrap=document.getElementById('nfm-'+fid);if(wrap)wrap.outerHTML=nfMultiHTML(nfFields[idx],idx);}
  }
}
function tagDel(fid,idx,ti){
  if(!Array.isArray(nfFields[idx].value))return;
  nfFields[idx].value.splice(ti,1);
  const wrap=document.getElementById('nfm-'+fid);if(wrap)wrap.outerHTML=nfMultiHTML(nfFields[idx],idx);
}

function nfAdd(){
  const f={id:uid(),key:'',type:'text',value:''};nfFields.push(f);
  const ed=document.getElementById('nf-editor');
  if(ed){const tmp=document.createElement('div');tmp.innerHTML=nfRowHTML(f,nfFields.length-1);ed.appendChild(tmp.firstElementChild);ed.lastElementChild.querySelector('.nf-key')?.focus();}
}
function nfDel(i){nfFields.splice(i,1);renderDyn();}

// ── Field type picker ──
function openPicker(fid,idx){
  if(activePicker===fid){closePicker();return;}
  activePicker=fid;
  const popup=document.getElementById('ft-popup');
  popup.innerHTML=FT_GROUPS.map(g=>'<div class="ftp-sec">'+g.sec+'</div>'+g.keys.map(k=>'<div class="ftp-item" onclick="setFType(\''+fid+'\','+idx+',\''+k+'\')"><span class="ftp-icon">'+FT[k].sym+'</span>'+FT[k].label+'</div>').join('')).join('');
  const btn=document.querySelector('#nfrow-'+fid+' .nf-type-btn');
  if(!btn)return;
  const r=btn.getBoundingClientRect();
  popup.style.left=Math.min(r.left,innerWidth-210)+'px';
  popup.style.top=Math.min(r.bottom+4,innerHeight-310)+'px';
  popup.classList.add('open');
}
function closePicker(){activePicker=null;document.getElementById('ft-popup').classList.remove('open');}
function setFType(fid,idx,type){
  nfFields[idx].type=type;nfFields[idx].value=defVal(type);closePicker();
  const row=document.getElementById('nfrow-'+fid);
  if(row){const sym=FT[type]?.sym||'T';row.querySelector('.nf-type-btn').innerHTML=sym;row.querySelector('.nf-type-btn').title=FT[type]?.label||type;const vw=row.querySelector('.nf-val-wrap');if(vw)vw.innerHTML=nfValHTML(nfFields[idx],idx);}
}

document.addEventListener('click',e=>{
  if(activePicker&&!e.target.closest('.nf-type-btn')&&!e.target.closest('#ft-popup'))closePicker();
  if(!e.target.closest('#ctx')&&!e.target.closest('.mbtn'))closeCtx();
});

// ── Checklist ──
function clKey(e,i){if(e.key==='Enter'){e.preventDefault();clAdd(i);}}
function clAdd(after){const it={id:uid(),text:'',done:false};if(after!==undefined)clItems.splice(after+1,0,it);else clItems.push(it);renderDyn();setTimeout(()=>{const rows=document.querySelectorAll('.clrow input');const t=rows[after!==undefined?after+1:rows.length-1];if(t)t.focus();},30);}
function clDel(i){if(clItems.length>1){clItems.splice(i,1);renderDyn();}}

// ── Open / Save ──
function openAdd(){
  editId=null;clItems=[{id:uid(),text:'',done:false}];nfFields=[];selType='habit';
  document.getElementById('modal-add-title').textContent='New Card';
  document.getElementById('save-lbl').textContent='Create Card';
  document.getElementById('f-title').value='';document.getElementById('f-desc').value='';
  renderTypeGrid();selectType('habit');openModal('modal-add');
  setTimeout(()=>document.getElementById('f-title').focus(),200);
}
function openEdit(id){
  const card=cards.find(c=>c.id===id);if(!card)return;
  editId=id;selType=card.type;
  clItems=(card.items||[]).map(i=>({...i}));if(!clItems.length)clItems=[{id:uid(),text:'',done:false}];
  nfFields=(card.nf||[]).map(f=>({...f,value:Array.isArray(f.value)?[...f.value]:f.value}));
  document.getElementById('modal-add-title').textContent='Edit Card';
  document.getElementById('save-lbl').textContent='Save';
  document.getElementById('f-title').value=card.title||'';document.getElementById('f-desc').value=card.desc||'';
  renderTypeGrid();selectType(card.type,card);openModal('modal-add');
}
function saveCard(){
  const title=document.getElementById('f-title').value.trim();if(!title){toast('Add a title');return;}
  document.querySelectorAll('.clrow input[type=text]').forEach((inp,i)=>{if(clItems[i])clItems[i].text=inp.value;});
  // flush open multi inputs
  nfFields.forEach((f,i)=>{if(f.type==='multi'){const inp=document.getElementById('nfmin-'+f.id);if(inp&&inp.value.trim()){if(!Array.isArray(f.value))f.value=[];f.value.push(inp.value.trim());}}});
  const d={title,desc:document.getElementById('f-desc').value.trim(),type:selType,note:document.getElementById('f-note')?.value.trim()||'',nf:nfFields};
  if(selType==='habit')d.items=clItems.filter(i=>i.text.trim());
  if(editId){const i=cards.findIndex(c=>c.id===editId);if(i!==-1)cards[i]={...cards[i],...d};toast('Saved');}
  else{cards.push({id:uid(),...d});toast('Card created');}
  save();renderBoard();renderStats();closeModal('modal-add');
}

// ── Detail ──
function openDetail(id){
  const card=cards.find(c=>c.id===id);if(!card)return;
  document.getElementById('modal-detail').dataset.cid=id;
  document.getElementById('d-tag').textContent=(TYPES[card.type]||TYPES.custom).label;
  document.getElementById('d-title').textContent=card.title;
  document.getElementById('d-desc').textContent=card.desc||'';
  let body='';
  if(card.type==='habit'&&(card.items||[]).length){
    const done=(card.items||[]).filter(i=>i.done).length,tot=(card.items||[]).length;
    body+='<div class="fg"><label class="fl">Activities — '+done+'/'+tot+'</label><div class="cl">'+(card.items||[]).map(it=>'<label class="ci'+(it.done?' done':'')+'"><input type="checkbox" data-cid="'+card.id+'" data-iid="'+it.id+'" '+(it.done?'checked':'')+'><span>'+esc(it.text)+'</span></label>').join('')+'</div></div>';
  }
  const nf=card.nf||[];
  if(nf.length)body+='<div class="flds">'+nf.map(f=>fDisplayHTML(f)).join('')+'</div>';
  if(card.note)body+='<div class="card-note">'+esc(card.note).replace(/\n/g,'<br>')+'</div>';
  body+='<div class="act-row"><button class="act-btn" onclick="dupCard(\''+card.id+'\')">Duplicate</button><button class="act-btn danger" onclick="delCard(\''+card.id+'\')">Delete</button></div>';
  document.getElementById('d-body').innerHTML=body;
  document.querySelectorAll('#d-body .ci input').forEach(cb=>cb.addEventListener('change',()=>{toggleCheck(cb.dataset.cid,cb.dataset.iid,cb.checked);openDetail(id);}));
  openModal('modal-detail');
}
function editFromDetail(){const id=document.getElementById('modal-detail').dataset.cid;closeModal('modal-detail');setTimeout(()=>openEdit(id),200);}
function delCard(id){if(!confirm('Delete?'))return;cards=cards.filter(c=>c.id!==id);save();renderBoard();renderStats();closeModal('modal-detail');toast('Deleted');}
function dupCard(id){const c=cards.find(x=>x.id===id);if(!c)return;const dup={...JSON.parse(JSON.stringify(c)),id:uid(),title:c.title+' (copy)'};const i=cards.findIndex(x=>x.id===id);cards.splice(i+1,0,dup);save();renderBoard();closeModal('modal-detail');toast('Duplicated');}

// ── CTX ──
function showCtx(e,id){ctxId=id;const m=document.getElementById('ctx');m.classList.add('open');let x=e.clientX,y=e.clientY;if(x+155>innerWidth)x=innerWidth-158;if(y+110>innerHeight-80)y=y-108;m.style.left=x+'px';m.style.top=y+'px';}
function closeCtx(){document.getElementById('ctx').classList.remove('open');}
function ctxEdit(){closeCtx();openEdit(ctxId);}
function ctxDup(){closeCtx();dupCard(ctxId);}
function ctxDel(){closeCtx();delCard(ctxId);}

// ── Reorder ──
function toggleReorder(){reorder=!reorder;document.getElementById('reorder-btn').classList.toggle('act',reorder);renderBoard();}
function dropCard(ti){if(dragIdx===null||dragIdx===ti)return;const m=cards.splice(dragIdx,1)[0];cards.splice(ti,0,m);dragIdx=null;save();renderBoard();}

// ── Modals ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function ovClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}

// ── Toast ──
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── Stats ──
function renderStats(){
  const wrap=document.getElementById('view-stats');const tot=cards.length;
  const habits=cards.filter(c=>c.type==='habit');
  const totI=habits.reduce((a,c)=>a+(c.items||[]).length,0);
  const doneI=habits.reduce((a,c)=>a+(c.items||[]).filter(i=>i.done).length,0);
  const byType={};cards.forEach(c=>byType[c.type]=(byType[c.type]||0)+1);
  wrap.innerHTML='<div class="sg"><div class="sc"><div class="sn">'+tot+'</div><div class="sl">Cards</div></div><div class="sc"><div class="sn">'+doneI+'/'+totI+'</div><div class="sl">Activities</div></div></div><div>'+Object.keys(byType).map(t=>{const p=tot?Math.round(byType[t]/tot*100):0;return '<div class="bar-row"><div class="bar-lbl"><span>'+(TYPES[t]||TYPES.custom).label+'</span><span>'+byType[t]+'</span></div><div class="btrack"><div class="bfill" style="width:'+p+'%"></div></div></div>';}).join('')+'</div>';
}

// ── Calendar ──
function renderCal(){
  const now=new Date();if(calY===undefined){calY=now.getFullYear();calM=now.getMonth();}
  const wrap=document.getElementById('view-calendar');
  const first=new Date(calY,calM,1).getDay(),last=new Date(calY,calM+1,0).getDate();
  const ev=new Set();cards.forEach(c=>(c.nf||[]).forEach(f=>{if(f.type==='date'&&f.value){const d=new Date(f.value);if(d.getMonth()===calM&&d.getFullYear()===calY)ev.add(d.getDate());}}));
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let g=days.map(d=>'<div class="cdh">'+d+'</div>').join('');
  for(let i=0;i<first;i++)g+='<div></div>';
  for(let d=1;d<=last;d++){const it=d===now.getDate()&&calM===now.getMonth()&&calY===now.getFullYear();g+='<div class="cd'+(it?' today':'')+(ev.has(d)?' hev':'')+'">'+(d)+'</div>';}
  wrap.innerHTML='<div class="cal-nav"><button class="btn" onclick="prevM()">&#8249;</button><span class="cal-title">'+new Date(calY,calM).toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</span><button class="btn" onclick="nextM()">&#8250;</button></div><div class="cal-g">'+g+'</div><div style="text-align:center;font-size:12px;color:var(--ink3);margin-top:14px">Dots mark date fields.</div>';
}
function prevM(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function nextM(){calM++;if(calM>11){calM=0;calY++;}renderCal();}

// ── Settings ──
function updateBN(v){bn=v||'My Workflow';localStorage.setItem('t-board',bn);}
function exportData(){const b=new Blob([JSON.stringify({boardName:bn,cards,exported:new Date().toISOString()},null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='trille.json';a.click();URL.revokeObjectURL(u);toast('Exported');}
function importData(){document.getElementById('import-file').click();}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.cards){cards=d.cards;if(d.boardName){bn=d.boardName;document.getElementById('bn-in').value=bn;}save();renderBoard();renderStats();toast('Imported');}}catch{toast('Invalid file');}};r.readAsText(f);e.target.value='';}
function clearAll(){if(!confirm('Delete all cards?'))return;cards=[];save();renderBoard();renderStats();toast('Cleared');}

init();
</script>
</body>
</html>
