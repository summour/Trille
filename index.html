<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trille — Workflow Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --surface-2: #f0ede8;
      --border: #e2ddd6;
      --text: #1a1714;
      --text-2: #6b645a;
      --text-3: #9e978d;
      --accent: #1a1714;
      --habit: #22c55e;
      --habit-bg: #dcfce7;
      --focus: #3b82f6;
      --focus-bg: #dbeafe;
      --output: #8b5cf6;
      --output-bg: #ede9fe;
      --project: #f59e0b;
      --project-bg: #fef3c7;
      --waiting: #f97316;
      --waiting-bg: #ffedd5;
      --note: #6b7280;
      --note-bg: #f3f4f6;
      --custom: #ec4899;
      --custom-bg: #fce7f3;
      --danger: #ef4444;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg: #141210;
      --surface: #1e1c19;
      --surface-2: #252220;
      --border: #2e2b27;
      --text: #f0ece6;
      --text-2: #8c8478;
      --text-3: #5c5550;
      --accent: #f0ece6;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background var(--transition), color var(--transition); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    header { position: sticky; top: 0; z-index: 100; background: color-mix(in srgb, var(--bg) 92%, transparent); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 12px; height: 60px; backdrop-filter: blur(12px); }
    .header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .logo { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: var(--text); color: var(--bg); font-weight: 800; letter-spacing: -1px; }
    .wordmark { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.5px; white-space: nowrap; }
    .wordmark em { font-style: italic; color: var(--text-2); }
    .board-title-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background var(--transition); min-width: 0; }
    .board-title-wrap:hover { background: var(--surface-2); }
    .board-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: transparent; color: var(--text); display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
    .icon-btn:hover { background: var(--surface-2); }

    .toolbar { padding: 14px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: var(--bg); flex-wrap: wrap; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .card-count { font-size: 13px; color: var(--text-3); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 8px 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 13.5px; font-weight: 600; transition: all var(--transition); }
    .btn:hover { background: var(--surface-2); border-color: var(--text-3); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-danger { color: var(--danger); }

    .view { padding-bottom: 86px; }
    .board, .stats-view, .calendar-view, .settings-view { padding: 20px; max-width: 760px; margin: 0 auto; }
    .board { display: flex; flex-direction: column; gap: 14px; }
    .search-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface-2); }
    .search-bar input { flex: 1; border: none; background: transparent; color: var(--text); outline: none; }

    .card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 18px 18px 16px; box-shadow: var(--shadow); position: relative; transition: all var(--transition); animation: slideIn 0.25s ease; overflow: hidden; }
    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .card.reorder-mode { border-style: dashed; cursor: grab; }
    .card.dragging { opacity: 0.5; transform: scale(0.98); }
    .card.drag-over { border-color: var(--focus); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .card-inner { padding-left: 10px; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-type-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; margin-bottom: 4px; }
    .card-title { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
    .card-desc { font-size: 13px; color: var(--text-2); margin-bottom: 10px; }
    .card-menu-btn { min-width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent; color: var(--text-3); transition: all var(--transition); }
    .card-menu-btn:hover { background: var(--surface-2); color: var(--text); }
    .progress-badge { min-width: 44px; height: 28px; border-radius: 100px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid; padding: 0 8px; }
    .checklist { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .checklist-item { display: flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--text); }
    .checklist-item input { width: 17px; height: 17px; accent-color: var(--habit); flex-shrink: 0; }
    .checklist-item.done span { text-decoration: line-through; color: var(--text-3); }
    .info-row { display: flex; align-items: baseline; gap: 6px; font-size: 13px; margin-bottom: 4px; }
    .info-label { color: var(--text-3); font-weight: 600; min-width: 68px; }
    .info-value { color: var(--text); }
    .info-value.highlight { color: var(--focus); font-weight: 600; }
    .info-value.warning { color: var(--waiting); font-weight: 600; }
    .status-pill { display: inline-flex; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
    .card-note { margin-top: 10px; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; font-size: 13px; color: var(--text-2); line-height: 1.5; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; border: none; background: transparent; color: var(--text-3); font-size: 11px; font-weight: 600; }
    .nav-item.active { color: var(--text); }

    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); backdrop-filter: blur(4px); }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 760px; max-height: 92vh; overflow-y: auto; transform: translateY(40px); transition: transform 0.32s cubic-bezier(0.4,0,0.2,1); padding-bottom: max(20px, env(safe-area-inset-bottom)); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 14px auto 0; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 13px; font-weight: 700; color: var(--text-2); }
    .form-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 14px; outline: none; resize: vertical; }
    .form-input:focus { border-color: var(--text-2); }
    .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .type-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 8px; border-radius: 12px; border: 2px solid var(--border); background: var(--surface-2); color: var(--text-2); font-size: 12px; font-weight: 700; }
    .type-btn.selected { border-color: currentColor; background: var(--surface); color: var(--text); }
    .checklist-editor { display: flex; flex-direction: column; gap: 8px; }
    .checklist-row { display: flex; align-items: center; gap: 8px; }
    .checklist-row input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text); outline: none; }
    .del-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: transparent; color: var(--text-3); font-size: 16px; }
    .del-btn:hover { background: #fee2e2; color: var(--danger); }
    .add-item-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-3); background: none; border: none; padding: 6px 0; }
    .action-row { display: flex; gap: 8px; margin-top: 4px; }
    .action-btn { flex: 1; padding: 11px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 13px; font-weight: 700; }
    .action-btn.danger { color: var(--danger); border-color: #fee2e2; }
    .ctx-menu { position: fixed; z-index: 300; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 6px; min-width: 160px; opacity: 0; pointer-events: none; transform: scale(0.95); transform-origin: top right; transition: all 0.15s ease; }
    .ctx-menu.open { opacity: 1; pointer-events: all; transform: scale(1); }
    .ctx-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; border-radius: 9px; border: none; background: none; color: var(--text); font-size: 13.5px; text-align: left; }
    .ctx-item:hover { background: var(--surface-2); }
    .ctx-item.danger { color: var(--danger); }
    .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

    .board-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .stat-number { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--text-3); font-weight: 600; }
    .cal-month { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-month-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-header { text-align: center; font-size: 11px; color: var(--text-3); font-weight: 700; padding: 6px 0; }
    .cal-day { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; position: relative; }
    .cal-day:hover { background: var(--surface-2); }
    .cal-day.today { background: var(--text); color: var(--bg); }
    .cal-day.has-event::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--focus); }
    .settings-section { margin-bottom: 24px; }
    .settings-section-title { font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 8px; gap: 12px; }
    .board-name-input { background: transparent; border: none; outline: none; font-size: 15px; font-weight: 600; color: var(--text); min-width: 80px; max-width: 220px; text-align: right; }
    .toggle { width: 44px; height: 26px; border-radius: 13px; background: var(--border); position: relative; border: none; }
    .toggle.on { background: var(--text); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: transform var(--transition); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle.on::after { transform: translateX(18px); }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 100px; font-size: 13.5px; font-weight: 700; box-shadow: var(--shadow-lg); z-index: 500; opacity: 0; transition: all 0.3s ease; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hidden { display: none !important; }

    @media (max-width: 520px) {
      .wordmark { display: none; }
      .type-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar-right { width: 100%; margin-left: 0; }
      .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">Tr</span>
      <span class="wordmark">trill<em>e</em></span>
      <div class="board-title-wrap" onclick="switchView('settings')">
        <span class="board-title" id="board-name-display">My Workflow Board</span>
        <span style="color:var(--text-3)">⌄</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleSearch()" title="Search">⌕</button>
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">🌙</button>
    </div>
  </header>

  <div class="toolbar" id="toolbar">
    <button class="btn btn-primary" onclick="openAddCard()">＋ Add Card</button>
    <button class="btn" onclick="toggleReorder()" id="reorder-btn">☰ Reorder</button>
    <div class="toolbar-right"><span class="card-count" id="card-count">0 Cards</span></div>
  </div>

  <main class="view">
    <section id="view-board">
      <div class="board" id="board-container">
        <div class="search-bar hidden" id="search-bar"><span>⌕</span><input id="search-input" placeholder="Search cards..." oninput="updateSearch(this.value)" /></div>
        <div class="card-count hidden" id="drag-hint">Drag to reorder cards</div>
      </div>
      <div style="padding:0 20px 20px;max-width:760px;margin:0 auto"><button class="btn" style="width:100%" onclick="openAddCard()">＋ Add Another Card</button></div>
    </section>

    <section id="view-stats" class="hidden stats-view"><div class="stats-grid" id="stats-grid"></div><div id="stats-breakdown"></div></section>
    <section id="view-calendar" class="hidden calendar-view"><div class="cal-month"><button class="icon-btn" onclick="prevMonth()">‹</button><span class="cal-month-title" id="cal-title"></span><button class="icon-btn" onclick="nextMonth()">›</button></div><div class="cal-grid" id="cal-grid"></div><div id="cal-events" style="margin-top:20px"></div></section>
    <section id="view-settings" class="hidden settings-view">
      <div class="settings-section">
        <div class="settings-section-title">Board Settings</div>
        <div class="settings-item"><span>Board Name</span><input class="board-name-input" id="board-name-input" value="My Workflow Board" oninput="updateBoardName(this.value)" /></div>
        <div class="settings-item"><span>Dark Mode</span><button class="toggle" id="dark-toggle" onclick="toggleTheme()"></button></div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Actions</div>
        <div class="settings-item" onclick="exportBoard()"><span>Export Board JSON</span><span>↗</span></div>
        <div class="settings-item" onclick="importBoard()"><span>Import Board JSON</span><span>↙</span></div>
        <div class="settings-item" onclick="clearBoard()" style="color:var(--danger)"><span>Clear All Cards</span><span>×</span></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchView('board',this)" id="nav-board">▦<span>Board</span></button>
    <button class="nav-item" onclick="switchView('stats',this)" id="nav-stats">▥<span>Stats</span></button>
    <button class="nav-item" onclick="switchView('calendar',this)" id="nav-calendar">□<span>Calendar</span></button>
    <button class="nav-item" onclick="switchView('settings',this)" id="nav-settings">⚙<span>Settings</span></button>
  </nav>

  <div class="modal-overlay" id="add-modal" onclick="closeModalOutside(event,'add-modal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header"><span class="modal-title" id="add-modal-title">Add New Card</span><button class="icon-btn" onclick="closeModal('add-modal')">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Card Type</label><div class="type-grid" id="type-grid"></div></div>
        <div class="form-group"><label class="form-label">Card Title</label><input class="form-input" id="card-title-input" placeholder="Enter card title..." maxlength="80" /></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="card-desc-input" placeholder="What is this card about?" rows="2"></textarea></div>
        <div id="dynamic-fields"></div>
        <button class="btn btn-primary" style="width:100%;padding:14px" onclick="saveCard()" id="save-btn-text">Create Card</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detail-modal" onclick="closeModalOutside(event,'detail-modal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header" style="border:none;padding-bottom:8px">
        <div><div id="detail-type-badge"></div><h2 id="detail-title" style="font-size:24px;font-family:'DM Serif Display',serif;line-height:1.2;margin-top:4px"></h2><p id="detail-desc" style="font-size:14px;color:var(--text-2);margin-top:2px"></p></div>
        <div style="display:flex;gap:4px"><button class="icon-btn" onclick="editCurrentCard()">✎</button><button class="icon-btn" onclick="closeModal('detail-modal')">✕</button></div>
      </div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>

  <div class="ctx-menu" id="ctx-menu"><button class="ctx-item" onclick="ctxEdit()">✎ Edit</button><button class="ctx-item" onclick="ctxDuplicate()">⧉ Duplicate</button><div class="ctx-divider"></div><button class="ctx-item danger" onclick="ctxDelete()">× Delete</button></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)" />

  <script>
    let cards = [];
    let editingId = null;
    let selectedType = 'habit';
    let ctxCardId = null;
    let reorderMode = false;
    let dragSrcIdx = null;
    let currentView = 'board';
    let calYear, calMonth;
    let darkMode = false;
    let boardName = 'My Workflow Board';
    let addChecklist = [];
    let searchQuery = '';
    let showSearch = false;

    const TYPE_CONFIG = {
      habit: { label: 'HABIT', color: 'var(--habit)', bg: 'var(--habit-bg)', icon: '🌱' },
      focus: { label: 'FOCUS', color: 'var(--focus)', bg: 'var(--focus-bg)', icon: '🎯' },
      output: { label: 'OUTPUT', color: 'var(--output)', bg: 'var(--output-bg)', icon: '🎙️' },
      project: { label: 'PROJECT', color: 'var(--project)', bg: 'var(--project-bg)', icon: '📁' },
      waiting: { label: 'WAITING', color: 'var(--waiting)', bg: 'var(--waiting-bg)', icon: '⏳' },
      note: { label: 'NOTE', color: 'var(--note)', bg: 'var(--note-bg)', icon: '📝' },
      custom: { label: 'CUSTOM', color: 'var(--custom)', bg: 'var(--custom-bg)', icon: '✨' }
    };

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function init() { renderTypeButtons(); load(); renderBoard(); renderStats(); renderCalendar(); detectTheme(); }
    function detectTheme() { const saved = localStorage.getItem('trille-theme'); setDark(saved === 'dark'); }
    function setDark(v) { darkMode = v; document.documentElement.setAttribute('data-theme', v ? 'dark' : 'light'); document.getElementById('theme-btn').textContent = v ? '☀️' : '🌙'; document.getElementById('dark-toggle')?.classList.toggle('on', v); localStorage.setItem('trille-theme', v ? 'dark' : 'light'); }
    function toggleTheme() { setDark(!darkMode); }
    function save() { localStorage.setItem('trille-cards', JSON.stringify(cards)); localStorage.setItem('trille-board', boardName); }
    function load() { const c = localStorage.getItem('trille-cards'); const b = localStorage.getItem('trille-board'); if (c) cards = JSON.parse(c); if (b) boardName = b; document.getElementById('board-name-display').textContent = boardName; document.getElementById('board-name-input').value = boardName; if (!cards.length) loadDefaults(); }
    function loadDefaults() { cards = [{ id: uid(), type: 'habit', title: 'Daily Routine', desc: 'Daily low cognitive load habits', items: [{ id: uid(), text: 'Yoga 10 min (morning)', done: true }, { id: uid(), text: 'Light diet', done: true }, { id: uid(), text: 'English Input (Tech & Econ)', done: false }, { id: uid(), text: 'Watch 1 online lecture', done: false }, { id: uid(), text: 'Savings transfer', done: false }], note: 'Today feeling more refreshed.', linkedTo: [] }, { id: uid(), type: 'focus', title: 'ก.พ. Phase ก', desc: '', dday: '2026-07-05', bestSlot: '08:00 - 10:00', action: 'Review old questions', status: 'in-progress', progress: 60, linkedTo: [] }, { id: uid(), type: 'output', title: 'English Output Project', input: 'Exam or economics topic', level: 'A2-B1', practice: '7', status: 'in-progress', linkedTo: [] }, { id: uid(), type: 'waiting', title: 'Google Data Analytics Certificate', waitStatus: 'Waiting for Financial Aid approval', checkDate: '2026-05-16', linkedTo: [] }]; save(); }

    function renderTypeButtons() { const grid = document.getElementById('type-grid'); grid.innerHTML = Object.keys(TYPE_CONFIG).map(type => `<button class="type-btn" data-type="${type}" onclick="selectType('${type}')"><span>${TYPE_CONFIG[type].icon}</span>${TYPE_CONFIG[type].label}</button>`).join(''); }
    function renderBoard() { const container = document.getElementById('board-container'); Array.from(container.querySelectorAll('.card,.board-empty')).forEach(el => el.remove()); document.getElementById('search-bar').classList.toggle('hidden', !showSearch); const filtered = searchQuery ? cards.filter(c => (c.title || '').toLowerCase().includes(searchQuery.toLowerCase()) || (c.desc || '').toLowerCase().includes(searchQuery.toLowerCase())) : cards; if (!filtered.length) { const empty = document.createElement('div'); empty.className = 'board-empty'; empty.innerHTML = `<h3>Your board is empty</h3><p>Tap Add Card to create your first workflow card.</p>`; container.appendChild(empty); } else filtered.forEach((card, idx) => container.appendChild(createCardEl(card, idx))); document.getElementById('drag-hint').classList.toggle('hidden', !reorderMode); document.getElementById('card-count').textContent = `${cards.length} Card${cards.length !== 1 ? 's' : ''}`; }
    function createCardEl(card, idx) { const cfg = TYPE_CONFIG[card.type] || TYPE_CONFIG.custom; const el = document.createElement('div'); el.className = 'card' + (reorderMode ? ' reorder-mode' : ''); el.dataset.id = card.id; el.innerHTML = `<div class="card-stripe" style="background:${cfg.color}"></div><div class="card-inner">${buildCardHTML(card, cfg)}</div>`; el.addEventListener('click', e => { if (e.target.closest('.card-menu-btn') || e.target.closest('.checklist-item')) return; openDetail(card.id); }); el.querySelector('.card-menu-btn')?.addEventListener('click', e => { e.stopPropagation(); showCtxMenu(e, card.id); }); el.querySelectorAll('.checklist-item input').forEach(cb => cb.addEventListener('change', e => { e.stopPropagation(); toggleCheckItem(card.id, cb.dataset.iid, cb.checked); })); if (reorderMode) { el.draggable = true; el.addEventListener('dragstart', () => { dragSrcIdx = idx; el.classList.add('dragging'); }); el.addEventListener('dragend', () => el.classList.remove('dragging')); el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); }); el.addEventListener('dragleave', () => el.classList.remove('drag-over')); el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); dropCard(idx); }); } return el; }
    function badgeHTML(card,cfg){return `<div class="card-type-badge" style="color:${cfg.color};background:${cfg.bg}">${cfg.icon} ${cfg.label}</div>`;}
    function buildCardHTML(card, cfg) { const badge = badgeHTML(card,cfg); const menu = `<button class="card-menu-btn">···</button>`; if (card.type === 'habit') { const done = (card.items||[]).filter(i=>i.done).length, total = (card.items||[]).length; return `<div class="card-header"><div>${badge}<div class="card-title">${esc(card.title)}</div>${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}</div><div style="display:flex;align-items:center;gap:6px"><div class="progress-badge" style="color:${cfg.color};border-color:${cfg.color}">${done}/${total}</div>${menu}</div></div><div class="checklist">${(card.items||[]).map(it => `<label class="checklist-item${it.done?' done':''}"><input type="checkbox" data-iid="${it.id}" ${it.done?'checked':''}/><span>${esc(it.text)}</span></label>`).join('')}</div>${card.note ? `<div class="card-note">${esc(card.note)}</div>` : ''}`; } if (card.type === 'focus') { const dday = card.dday ? new Date(card.dday) : null; const daysLeft = dday ? Math.ceil((dday - new Date()) / 86400000) : null; return `<div class="card-header"><div>${badge}<div class="card-title">${esc(card.title)}</div></div>${menu}</div>${dday ? `<div class="info-row"><span class="info-label">D-Day:</span><span class="info-value">${dday.toLocaleDateString('en-GB')} <span class="${daysLeft<=30?'warning':'highlight'}">(${daysLeft} days)</span></span></div>` : ''}${card.bestSlot ? `<div class="info-row"><span class="info-label">Best slot:</span><span>${esc(card.bestSlot)}</span></div>` : ''}${card.action ? `<div class="info-row"><span class="info-label">Action:</span><span>${esc(card.action)}</span></div>` : ''}${card.status ? `<div class="info-row"><span class="info-label">Status:</span><span>${statusPill(card.status)}</span></div>` : ''}`; } if (card.type === 'output') { return `<div class="card-header"><div>${badge}<div class="card-title">${esc(card.title)}</div></div>${menu}</div>${card.input ? `<div class="info-row"><span class="info-label">Input:</span><span>${esc(card.input)}</span></div>` : ''}${card.level ? `<div class="info-row"><span class="info-label">Level:</span><span>${esc(card.level)}</span></div>` : ''}${card.practice ? `<div class="info-row"><span class="info-label">Practice:</span><span>${esc(card.practice)} min</span></div>` : ''}`; } if (card.type === 'waiting') { const cd = card.checkDate ? new Date(card.checkDate) : null; return `<div class="card-header"><div>${badge}<div class="card-title">${esc(card.title)}</div></div>${menu}</div>${card.waitStatus ? `<div class="info-row"><span class="info-label">Status:</span><span>${esc(card.waitStatus)}</span></div>` : ''}${cd ? `<div class="info-row"><span class="info-label">Check:</span><span>${cd.toLocaleDateString('en-GB')}</span></div>` : ''}`; } return `<div class="card-header"><div>${badge}<div class="card-title">${esc(card.title)}</div></div>${menu}</div>${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}${card.note ? `<div class="card-note">${esc(card.note)}</div>` : ''}`; }
    function statusPill(s) { const map = {'in-progress':['In Progress','var(--focus)','var(--focus-bg)'], done:['Done','var(--habit)','var(--habit-bg)'], pending:['Pending','var(--text-3)','var(--surface-2)'], blocked:['Blocked','var(--danger)','#fee2e2']}; const [label,color,bg] = map[s] || [s,'var(--text-3)','var(--surface-2)']; return `<span class="status-pill" style="color:${color};background:${bg}">${label}</span>`; }
    function toggleCheckItem(cardId,itemId,checked){ const card=cards.find(c=>c.id===cardId); const item=card?.items?.find(i=>i.id===itemId); if(item){ item.done=checked; save(); renderBoard(); renderStats(); }}

    function openAddCard(){ editingId=null; addChecklist=[{id:uid(), text:'', done:false}]; selectedType='habit'; document.getElementById('add-modal-title').textContent='Add New Card'; document.getElementById('save-btn-text').textContent='Create Card'; document.getElementById('card-title-input').value=''; document.getElementById('card-desc-input').value=''; renderTypeButtons(); selectType('habit'); openModal('add-modal'); setTimeout(()=>document.getElementById('card-title-input').focus(),200); }
    function openEditCard(id){ const card=cards.find(c=>c.id===id); if(!card)return; editingId=id; selectedType=card.type; addChecklist=(card.items||[]).map(i=>({...i})); if(!addChecklist.length)addChecklist=[{id:uid(), text:'', done:false}]; document.getElementById('add-modal-title').textContent='Edit Card'; document.getElementById('save-btn-text').textContent='Save Changes'; document.getElementById('card-title-input').value=card.title||''; document.getElementById('card-desc-input').value=card.desc||''; renderTypeButtons(); selectType(card.type, card); openModal('add-modal'); }
    function selectType(type, card){ selectedType=type; document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('selected', b.dataset.type===type)); renderDynamicFields(card); }
    function renderDynamicFields(card){ const el=document.getElementById('dynamic-fields'); let html=''; if(selectedType==='habit'){ html=`<div class="form-group"><label class="form-label">Activities</label><div class="checklist-editor" id="cl-editor">${addChecklist.map((it,i)=>`<div class="checklist-row"><input type="text" placeholder="Activity..." value="${esc(it.text)}" oninput="updateClItem(${i},this.value)" onkeydown="clKeydown(event,${i})"><button class="del-btn" onclick="removeClItem(${i})" type="button">×</button></div>`).join('')}</div><button class="add-item-btn" onclick="addClItem()" type="button">＋ Add activity</button></div><div class="form-group"><label class="form-label">Note</label><textarea class="form-input" id="card-note-input" rows="2">${esc(card?.note||'')}</textarea></div>`; } else if(selectedType==='focus'){ html=`<div class="form-group"><label class="form-label">D-Day</label><input class="form-input" id="f-dday" type="date" value="${card?.dday||''}"></div><div class="form-group"><label class="form-label">Best Time Slot</label><input class="form-input" id="f-slot" value="${esc(card?.bestSlot||'')}"></div><div class="form-group"><label class="form-label">Action</label><input class="form-input" id="f-action" value="${esc(card?.action||'')}"></div><div class="form-group"><label class="form-label">Progress (%)</label><input class="form-input" id="f-progress" type="number" min="0" max="100" value="${card?.progress||0}"></div><div class="form-group"><label class="form-label">Status</label><select class="form-input" id="f-status"><option value="in-progress">In Progress</option><option value="pending">Pending</option><option value="done">Done</option><option value="blocked">Blocked</option></select></div>`; } else if(selectedType==='output'){ html=`<div class="form-group"><label class="form-label">Input Source</label><input class="form-input" id="o-input" value="${esc(card?.input||'')}"></div><div class="form-group"><label class="form-label">Level</label><input class="form-input" id="o-level" value="${esc(card?.level||'')}"></div><div class="form-group"><label class="form-label">Practice Duration</label><input class="form-input" id="o-practice" value="${esc(card?.practice||'')}"></div>`; } else if(selectedType==='waiting'){ html=`<div class="form-group"><label class="form-label">Wait Status</label><input class="form-input" id="w-status" value="${esc(card?.waitStatus||'')}"></div><div class="form-group"><label class="form-label">Check Date</label><input class="form-input" id="w-date" type="date" value="${card?.checkDate||''}"></div>`; } else { html=`<div class="form-group"><label class="form-label">Note</label><textarea class="form-input" id="card-note-input" rows="3">${esc(card?.note||'')}</textarea></div>`; } el.innerHTML=html; if(card?.status && document.getElementById('f-status')) document.getElementById('f-status').value=card.status; }
    function updateClItem(i,val){ addChecklist[i].text=val; }
    function clKeydown(e,i){ if(e.key==='Enter'){ e.preventDefault(); addClItem(i); }}
    function addClItem(afterIdx){ const item={id:uid(), text:'', done:false}; if(afterIdx!==undefined)addChecklist.splice(afterIdx+1,0,item); else addChecklist.push(item); renderDynamicFields(); }
    function removeClItem(i){ if(addChecklist.length>1){ addChecklist.splice(i,1); renderDynamicFields(); }}
    function saveCard(){ const title=document.getElementById('card-title-input').value.trim(); if(!title){ showToast('Please enter a card title'); return; } document.querySelectorAll('#cl-editor input[type=text]').forEach((inp,i)=>{ if(addChecklist[i]) addChecklist[i].text=inp.value; }); const desc=document.getElementById('card-desc-input').value.trim(); let data={title,desc,type:selectedType}; if(selectedType==='habit'){data.items=addChecklist.filter(i=>i.text.trim());data.note=document.getElementById('card-note-input')?.value.trim()||'';} else if(selectedType==='focus'){data.dday=document.getElementById('f-dday')?.value||'';data.bestSlot=document.getElementById('f-slot')?.value.trim()||'';data.action=document.getElementById('f-action')?.value.trim()||'';data.progress=parseInt(document.getElementById('f-progress')?.value)||0;data.status=document.getElementById('f-status')?.value||'in-progress';} else if(selectedType==='output'){data.input=document.getElementById('o-input')?.value.trim()||'';data.level=document.getElementById('o-level')?.value.trim()||'';data.practice=document.getElementById('o-practice')?.value.trim()||'';} else if(selectedType==='waiting'){data.waitStatus=document.getElementById('w-status')?.value.trim()||'';data.checkDate=document.getElementById('w-date')?.value||'';} else {data.note=document.getElementById('card-note-input')?.value.trim()||'';} if(editingId){ const idx=cards.findIndex(c=>c.id===editingId); if(idx!==-1) cards[idx]={...cards[idx],...data}; showToast('Card updated'); } else { cards.push({id:uid(),linkedTo:[],...data}); showToast('Card created'); } save(); renderBoard(); renderStats(); renderCalendar(); closeModal('add-modal'); }

    function openDetail(id){ const card=cards.find(c=>c.id===id); if(!card)return; const cfg=TYPE_CONFIG[card.type]||TYPE_CONFIG.custom; document.getElementById('detail-type-badge').innerHTML=badgeHTML(card,cfg); document.getElementById('detail-title').textContent=card.title; document.getElementById('detail-desc').textContent=card.desc||''; let body=''; if(card.type==='habit'){ const done=(card.items||[]).filter(i=>i.done).length,total=(card.items||[]).length; body += `<div class="form-label">Activities (${done}/${total})</div><div class="checklist">${(card.items||[]).map(it=>`<label class="checklist-item${it.done?' done':''}"><input type="checkbox" data-cid="${card.id}" data-iid="${it.id}" ${it.done?'checked':''}><span>${esc(it.text)}</span></label>`).join('')}</div>${card.note?`<div class="card-note">${esc(card.note)}</div>`:''}`;} else body += buildCardHTML(card,cfg).replace(/<button class="card-menu-btn">···<\/button>/g,''); body += `<div class="action-row"><button class="action-btn" onclick="duplicateCard('${card.id}')">Duplicate</button><button class="action-btn danger" onclick="deleteCard('${card.id}')">Delete</button></div>`; document.getElementById('detail-body').innerHTML=body; document.querySelectorAll('#detail-body .checklist-item input').forEach(cb=>cb.addEventListener('change',()=>{toggleCheckItem(cb.dataset.cid, cb.dataset.iid, cb.checked); openDetail(id);})); document.getElementById('detail-modal').dataset.cardId=id; openModal('detail-modal'); }
    function editCurrentCard(){ const id=document.getElementById('detail-modal').dataset.cardId; closeModal('detail-modal'); setTimeout(()=>openEditCard(id),180); }
    function deleteCard(id){ if(!confirm('Delete this card?'))return; cards=cards.filter(c=>c.id!==id); cards.forEach(c=>c.linkedTo=(c.linkedTo||[]).filter(l=>l!==id)); save(); renderBoard(); renderStats(); closeModal('detail-modal'); showToast('Card deleted'); }
    function duplicateCard(id){ const card=cards.find(c=>c.id===id); if(!card)return; const dup={...JSON.parse(JSON.stringify(card)), id:uid(), title:card.title+' (copy)', linkedTo:[]}; const idx=cards.findIndex(c=>c.id===id); cards.splice(idx+1,0,dup); save(); renderBoard(); renderStats(); closeModal('detail-modal'); showToast('Card duplicated'); }
    function showCtxMenu(e,id){ ctxCardId=id; const m=document.getElementById('ctx-menu'); m.classList.add('open'); let x=e.clientX,y=e.clientY; if(x+170>innerWidth)x=innerWidth-175; if(y+130>innerHeight-80)y=y-130; m.style.left=x+'px'; m.style.top=y+'px'; }
    function closeCtxMenu(){document.getElementById('ctx-menu').classList.remove('open');}
    function ctxEdit(){closeCtxMenu();openEditCard(ctxCardId);} function ctxDuplicate(){closeCtxMenu();duplicateCard(ctxCardId);} function ctxDelete(){closeCtxMenu();deleteCard(ctxCardId);} document.addEventListener('click',e=>{if(!e.target.closest('#ctx-menu')&&!e.target.closest('.card-menu-btn'))closeCtxMenu();});
    function toggleReorder(){ reorderMode=!reorderMode; document.getElementById('reorder-btn').classList.toggle('btn-primary', reorderMode); renderBoard(); }
    function dropCard(targetIdx){ if(dragSrcIdx===null||dragSrcIdx===targetIdx)return; const moved=cards.splice(dragSrcIdx,1)[0]; cards.splice(targetIdx,0,moved); dragSrcIdx=null; save(); renderBoard(); }
    function openModal(id){document.getElementById(id).classList.add('open');} function closeModal(id){document.getElementById(id).classList.remove('open');} function closeModalOutside(e,id){ if(e.target===document.getElementById(id))closeModal(id); }
    function toggleSearch(){ showSearch=!showSearch; if(!showSearch) searchQuery=''; renderBoard(); setTimeout(()=>document.getElementById('search-input')?.focus(),50); } function updateSearch(v){ searchQuery=v; renderBoard(); }
    function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
    function switchView(name, btn){ currentView=name; ['board','stats','calendar','settings'].forEach(v=>document.getElementById(`view-${v}`).classList.toggle('hidden',v!==name)); document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); (btn||document.getElementById(`nav-${name}`))?.classList.add('active'); document.getElementById('toolbar').style.display=name==='board'?'flex':'none'; if(name==='stats')renderStats(); if(name==='calendar')renderCalendar(); }
    function renderStats(){ const grid=document.getElementById('stats-grid'), bd=document.getElementById('stats-breakdown'); if(!grid)return; const total=cards.length; const habit=cards.filter(c=>c.type==='habit'); const totalItems=habit.reduce((a,c)=>a+(c.items||[]).length,0); const doneItems=habit.reduce((a,c)=>a+(c.items||[]).filter(i=>i.done).length,0); grid.innerHTML=`<div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Cards</div></div><div class="stat-card"><div class="stat-number" style="color:var(--habit)">${doneItems}/${totalItems}</div><div class="stat-label">Activities Done</div></div><div class="stat-card"><div class="stat-number" style="color:var(--focus)">${cards.filter(c=>c.status==='in-progress').length}</div><div class="stat-label">In Progress</div></div><div class="stat-card"><div class="stat-number" style="color:var(--waiting)">${cards.filter(c=>c.type==='waiting').length}</div><div class="stat-label">Waiting</div></div>`; const byType={}; cards.forEach(c=>byType[c.type]=(byType[c.type]||0)+1); bd.innerHTML='<div class="form-label">By Type</div>'+Object.keys(byType).map(t=>{const cfg=TYPE_CONFIG[t]||TYPE_CONFIG.custom; const pct=total?Math.round(byType[t]/total*100):0; return `<div style="margin:12px 0"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>${cfg.icon} ${cfg.label}</span><span style="color:var(--text-3)">${byType[t]}</span></div><div style="height:6px;border-radius:3px;background:var(--border)"><div style="height:100%;border-radius:3px;background:${cfg.color};width:${pct}%"></div></div></div>`;}).join(''); }
    function renderCalendar(){ const now=new Date(); if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth();} document.getElementById('cal-title').textContent=new Date(calYear,calMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'}); const grid=document.getElementById('cal-grid'); const days=['Su','Mo','Tu','We','Th','Fr','Sa']; let html=days.map(d=>`<div class="cal-day-header">${d}</div>`).join(''); const first=new Date(calYear,calMonth,1).getDay(); const last=new Date(calYear,calMonth+1,0).getDate(); const eventDates=new Set(); cards.forEach(c=>{[c.dday,c.checkDate].forEach(raw=>{if(raw){const d=new Date(raw);if(d.getMonth()===calMonth&&d.getFullYear()===calYear)eventDates.add(d.getDate());}})}); for(let i=0;i<first;i++)html+='<div></div>'; for(let d=1;d<=last;d++){const isToday=d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();html+=`<div class="cal-day${isToday?' today':''}${eventDates.has(d)?' has-event':''}">${d}</div>`;} grid.innerHTML=html; document.getElementById('cal-events').innerHTML='<div style="text-align:center;color:var(--text-3);font-size:13px;padding:20px">Dots mark D-Day or check dates.</div>'; }
    function prevMonth(){calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar();} function nextMonth(){calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar();}
    function updateBoardName(v){boardName=v||'My Workflow Board'; document.getElementById('board-name-display').textContent=boardName; localStorage.setItem('trille-board',boardName);} function exportBoard(){const blob=new Blob([JSON.stringify({boardName,cards,exported:new Date().toISOString()},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='trille-board.json';a.click();URL.revokeObjectURL(url);showToast('Board exported');} function importBoard(){document.getElementById('import-input').click();} function handleImport(e){const f=e.target.files[0]; if(!f)return; const reader=new FileReader(); reader.onload=ev=>{try{const data=JSON.parse(ev.target.result); if(data.cards){cards=data.cards; if(data.boardName)updateBoardName(data.boardName); save(); renderBoard(); renderStats(); showToast('Board imported');}}catch{showToast('Invalid file');}}; reader.readAsText(f); e.target.value='';} function clearBoard(){if(!confirm('Clear all cards?'))return; cards=[]; save(); renderBoard(); renderStats(); showToast('Board cleared');}
    init();
  </script>
